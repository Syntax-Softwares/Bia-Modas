<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bia Modas - Minha Conta." />
    <title>Minha Conta | Bia Modas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/dark-mode.css">
    <link rel="stylesheet" href="./css/usuario.css">
    <script>
        (function() {
            const theme = localStorage.getItem('bia_modas_theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <script src="./js/components.js"></script>
    <script>
        BiaModasComponents.inject({
            logoHref: './index.html',
            contaHref: '#'
        });
    </script>

    <!-- Profile Page -->
    <section class="products-section profile-section">
        <div class="container">
            <div class="section-header">
                <h2>Minha Conta</h2>
                <div class="line"></div>
                <p class="mt-3">Gerencie seus dados, medidas e preferências</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="profile-card">

                        <!-- Avatar & Name -->
                        <div class="text-center mb-4">
                            <div id="profile-avatar">
                                <i class="bi bi-person"></i>
                            </div>
                            <h3 class="mt-3 mb-1" id="profile-name"></h3>
                            <p class="mb-0" id="profile-email"></p>
                        </div>

                        <!-- Tabs -->
                        <div class="profile-tabs">
                            <button class="profile-tab active" onclick="switchTab('dados')">Dados Pessoais</button>
                            <button class="profile-tab" onclick="switchTab('endereco')">Endereço</button>
                            <button class="profile-tab" onclick="switchTab('medidas')">Medidas</button>
                            <button class="profile-tab" onclick="switchTab('preferencias')">Preferências</button>
                            <button class="profile-tab" onclick="switchTab('seguranca')">Segurança</button>
                        </div>

                        <!-- Tab: Dados Pessoais -->
                        <div class="profile-tab-content active" id="tab-dados">
                            <form class="auth-form" onsubmit="return saveProfile(event, 'dados')">
                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label>Nome Completo</label>
                                        <input type="text" class="form-control" id="pf-nome" required>
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label>E-mail</label>
                                        <input type="email" class="form-control" id="pf-email" required>
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label>Telefone</label>
                                        <input type="tel" class="form-control" id="pf-telefone" maxlength="15">
                                    </div>
                                </div>
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn-primary-solid">
                                        <i class="bi bi-check-lg me-2"></i>Salvar Alterações
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Tab: Endereço -->
                        <div class="profile-tab-content" id="tab-endereco">
                            <form class="auth-form" onsubmit="return saveProfile(event, 'endereco')">
                                <div class="row">
                                    <div class="col-md-4 form-group">
                                        <label>CEP</label>
                                        <input type="text" class="form-control" id="pf-cep" maxlength="9">
                                    </div>
                                    <div class="col-md-8 form-group">
                                        <label>Endereço</label>
                                        <input type="text" class="form-control" id="pf-endereco">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Número</label>
                                        <input type="text" class="form-control" id="pf-numero">
                                    </div>
                                    <div class="col-md-8 form-group">
                                        <label>Bairro</label>
                                        <input type="text" class="form-control" id="pf-bairro">
                                    </div>
                                    <div class="col-md-8 form-group">
                                        <label>Cidade</label>
                                        <input type="text" class="form-control" id="pf-cidade">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Estado</label>
                                        <input type="text" class="form-control" id="pf-estado" maxlength="2">
                                    </div>
                                </div>
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn-primary-solid">
                                        <i class="bi bi-check-lg me-2"></i>Salvar Endereço
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Tab: Medidas -->
                        <div class="profile-tab-content" id="tab-medidas">
                            <form class="auth-form" onsubmit="return saveProfile(event, 'medidas')">
                                <div class="row">
                                    <div class="col-md-4 form-group">
                                        <label>Busto (cm)</label>
                                        <input type="number" class="form-control" id="pf-busto" min="50" max="200">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Cintura (cm)</label>
                                        <input type="number" class="form-control" id="pf-cintura" min="40" max="200">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Quadril (cm)</label>
                                        <input type="number" class="form-control" id="pf-quadril" min="50" max="200">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Altura (cm)</label>
                                        <input type="number" class="form-control" id="pf-altura" min="100" max="220">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Tamanho de Blusa</label>
                                        <select class="form-control" id="pf-blusa">
                                            <option value="">Selecione</option>
                                            <option value="PP">PP</option>
                                            <option value="P">P</option>
                                            <option value="M">M</option>
                                            <option value="G">G</option>
                                            <option value="GG">GG</option>
                                            <option value="XG">XG</option>
                                            <option value="XXG">XXG</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Tamanho de Calça</label>
                                        <select class="form-control" id="pf-calca">
                                            <option value="">Selecione</option>
                                            <option value="34">34</option>
                                            <option value="36">36</option>
                                            <option value="38">38</option>
                                            <option value="40">40</option>
                                            <option value="42">42</option>
                                            <option value="44">44</option>
                                            <option value="46">46</option>
                                            <option value="48">48</option>
                                            <option value="50">50</option>
                                            <option value="52">52</option>
                                            <option value="54">54</option>
                                            <option value="56">56</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Tamanho de Vestido</label>
                                        <select class="form-control" id="pf-vestido">
                                            <option value="">Selecione</option>
                                            <option value="34">34</option>
                                            <option value="36">36</option>
                                            <option value="38">38</option>
                                            <option value="40">40</option>
                                            <option value="42">42</option>
                                            <option value="44">44</option>
                                            <option value="46">46</option>
                                            <option value="48">48</option>
                                            <option value="50">50</option>
                                            <option value="52">52</option>
                                            <option value="54">54</option>
                                            <option value="56">56</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn-primary-solid">
                                        <i class="bi bi-check-lg me-2"></i>Salvar Medidas
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Tab: Preferências -->
                        <div class="profile-tab-content" id="tab-preferencias">
                            <form class="auth-form" onsubmit="return saveProfile(event, 'preferencias')">
                                <div class="form-group">
                                    <label>Cores Favoritas</label>
                                    <div class="checkbox-group">
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-preto" value="Preto" name="pf-cores"><label for="pf-cor-preto"><i class="bi bi-palette-fill color-swatch-preto"></i> Preto</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-branco" value="Branco" name="pf-cores"><label for="pf-cor-branco"><i class="bi bi-palette-fill color-swatch-branco"></i> Branco</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-vermelho" value="Vermelho" name="pf-cores"><label for="pf-cor-vermelho"><i class="bi bi-palette-fill color-swatch-vermelho"></i> Vermelho</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-azul" value="Azul" name="pf-cores"><label for="pf-cor-azul"><i class="bi bi-palette-fill color-swatch-azul"></i> Azul</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-verde" value="Verde" name="pf-cores"><label for="pf-cor-verde"><i class="bi bi-palette-fill color-swatch-verde"></i> Verde</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-rosa" value="Rosa" name="pf-cores"><label for="pf-cor-rosa"><i class="bi bi-palette-fill color-swatch-rosa"></i> Rosa</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-estampado" value="Estampado" name="pf-cores"><label for="pf-cor-estampado"><i class="bi bi-palette-fill color-swatch-estampado"></i> Estampado</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-cor-neutro" value="Neutro" name="pf-cores"><label for="pf-cor-neutro"><i class="bi bi-palette-fill color-swatch-neutro"></i> Neutro</label></div>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Estilos Preferidos</label>
                                    <div class="checkbox-group">
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-casual" value="Casual" name="pf-estilos"><label for="pf-estilo-casual"><i class="bi bi-sunglasses"></i> Casual</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-elegante" value="Elegante" name="pf-estilos"><label for="pf-estilo-elegante"><i class="bi bi-gem"></i> Elegante</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-esportivo" value="Esportivo" name="pf-estilos"><label for="pf-estilo-esportivo"><i class="bi bi-bicycle"></i> Esportivo</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-romantico" value="Romântico" name="pf-estilos"><label for="pf-estilo-romantico"><i class="bi bi-heart"></i> Romântico</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-vintage" value="Vintage" name="pf-estilos"><label for="pf-estilo-vintage"><i class="bi bi-hourglass"></i> Vintage</label></div>
                                        <div class="checkbox-tag"><input type="checkbox" id="pf-estilo-minimalista" value="Minimalista" name="pf-estilos"><label for="pf-estilo-minimalista"><i class="bi bi-dash-lg"></i> Minimalista</label></div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label>Tipo de Corpo</label>
                                        <select class="form-control" id="pf-tipo-corpo">
                                            <option value="">Prefiro não informar</option>
                                            <option value="ampulheta">Ampulheta</option>
                                            <option value="triangulo">Triângulo (Pêra)</option>
                                            <option value="triangulo-invertido">Triângulo Invertido</option>
                                            <option value="retangulo">Retângulo</option>
                                            <option value="oval">Oval (Maçã)</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="newsletter-label">
                                        <input type="checkbox" id="pf-newsletter">
                                        <span>Quero receber novidades, ofertas exclusivas e dicas de moda por e-mail.</span>
                                    </label>
                                </div>

                                <div class="text-center mt-3">
                                    <button type="submit" class="btn-primary-solid">
                                        <i class="bi bi-check-lg me-2"></i>Salvar Preferências
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Tab: Segurança -->
                        <div class="profile-tab-content" id="tab-seguranca">
                            <form class="auth-form" onsubmit="return saveProfile(event, 'seguranca')">
                                <div class="row justify-content-center">
                                    <div class="col-md-6 form-group">
                                        <label>Nova Senha</label>
                                        <div class="password-field">
                                            <input type="password" class="form-control" id="pf-senha" placeholder="Mínimo 6 caracteres">
                                            <button type="button" class="password-toggle" onclick="togglePassword('pf-senha', this)"><i class="bi bi-eye"></i></button>
                                        </div>
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label>Confirmar Nova Senha</label>
                                        <div class="password-field">
                                            <input type="password" class="form-control" id="pf-senha-confirmar" placeholder="Repita a nova senha">
                                            <button type="button" class="password-toggle" onclick="togglePassword('pf-senha-confirmar', this)"><i class="bi bi-eye"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn-primary-solid">
                                        <i class="bi bi-shield-check me-2"></i>Atualizar Senha
                                    </button>
                                </div>
                            </form>

                            <div class="logout-section">
                                <p>Deseja sair da sua conta?</p>
                                <button type="button" class="btn-primary-solid btn-logout" onclick="handleLogout(event)">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sair da Conta
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/theme.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/usuario.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0t3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
