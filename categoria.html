<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bia Modas - Explore nossas categorias." />
    <title>Categoria | Bia Modas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/categoria.css">
</head>
<body>
    <script src="./js/components.js"></script>
    <script>
        BiaModasComponents.inject({
            logoHref: './index.html'
        });
    </script>

    <!-- Sidebar de Filtros (drawer lateral) -->
    <aside class="category-sidebar" id="category-sidebar">
        <header class="category-sidebar-header">
            <h2>Filtros</h2>
            <button class="category-sidebar-close" onclick="closeSidebar()" aria-label="Fechar filtros">
                <i class="bi bi-x-lg"></i>
            </button>
        </header>

        <div class="category-sidebar-body" id="filter-sidebar-desktop">
            <button class="btn-clear-filters" onclick="clearAllFilters()">
                Limpar todos os filtros
            </button>

            <div class="filter-section">
                <h4>Categorias</h4>
                <ul class="filter-category-list" id="filter-categories"></ul>
            </div>

            <div class="filter-section">
                <h4>Cores</h4>
                <div class="filter-colors" id="filter-colors"></div>
            </div>

            <div class="filter-section">
                <h4>Preço</h4>
                <div class="filter-price-options" id="filter-prices"></div>
            </div>

            <div class="filter-section">
                <h4>Tamanhos</h4>
                <div class="filter-sizes" id="filter-sizes"></div>
            </div>

            <div class="filter-section">
                <h4>Estilos</h4>
                <div class="filter-checkbox-group" id="filter-estilos"></div>
            </div>

            <div class="filter-section">
                <label class="filter-promo-toggle">
                    <input type="checkbox" id="filter-promo" onchange="applyFilters()">
                    <span><i class="bi bi-tag-fill" style="color: var(--color-primary);"></i> Somente em Promoção</span>
                </label>
            </div>
        </div>
    </aside>

    <div class="category-sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Wrapper que recebe padding quando a sidebar abre no desktop -->
    <div class="category-content" id="category-content">
        <!-- Page Header -->
        <section class="page-header">
            <div class="container">
                <div class="breadcrumb">
                    <a href="./index.html"><i class="bi bi-house-door"></i> Início</a>
                    <i class="bi bi-chevron-right" style="font-size: 0.7rem;"></i>
                    <span id="breadcrumb-current">Todos os Produtos</span>
                </div>
                <h1 id="page-title">Todos os Produtos</h1>
                <p id="page-subtitle">Explore nossa coleção</p>
            </div>
        </section>

        <!-- Filter Page -->
        <section class="filter-page">
            <div class="container-fluid filter-page-container">
                <!-- Topbar com botão de abrir filtros + ordenação -->
                <div class="filter-page-topbar">
                    <button class="filter-open-btn" id="filter-open-btn" onclick="openSidebar()">
                        <i class="bi bi-funnel"></i>
                        <span>Filtros</span>
                    </button>

                    <span class="filter-results-count" id="results-count">Carregando...</span>

                    <div class="filter-sort">
                        <label for="sort-select">Ordenar</label>
                        <select id="sort-select" onchange="applyFilters()">
                            <option value="">Relevância</option>
                            <option value="menor-preco">Menor Preço</option>
                            <option value="maior-preco">Maior Preço</option>
                            <option value="nome">Nome A-Z</option>
                        </select>
                    </div>
                </div>

                <div class="active-filters" id="active-filters"></div>

                <div class="row" id="products-grid"></div>
            </div>
        </section>
    </div>

    <script src="./js/utils.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/favoritos.js"></script>
    <script src="./js/catalogo.js"></script>
    <script src="./js/categoria-filtros.js"></script>
    <script src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0t3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
