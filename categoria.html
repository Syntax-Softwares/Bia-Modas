<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bia Modas - Explore nossas categorias." />
    <title>Categoria | Bia Modas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/dark-mode.css">
    <link rel="stylesheet" href="./css/categoria.css">
    <script>
        (function() {
            const theme = localStorage.getItem('bia_modas_theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <script src="./js/components.js"></script>
    <script>
        BiaModasComponents.inject({
            logoHref: './index.html',
            contaHref: '#'
        });
    </script>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <div class="breadcrumb">
                <a href="./index.html"><i class="bi bi-house-door"></i> Início</a>
                <i class="bi bi-chevron-right" style="font-size: 0.7rem;"></i>
                <span id="breadcrumb-current">Todos os Produtos</span>
            </div>
            <h1 id="page-title">Todos os Produtos</h1>
            <p id="page-subtitle">Explore nossa coleção</p>
        </div>
    </section>

    <!-- Filter Page -->
    <section class="filter-page">
        <div class="container">
            <div class="row">
                <!-- Sidebar Desktop -->
                <div class="col-lg-3 filter-sidebar-desktop">
                    <div class="filter-sidebar" id="filter-sidebar-desktop">
                        <button class="btn-clear-filters mb-4" onclick="clearAllFilters()">
                            <i class="bi bi-x-lg"></i> Limpar Filtros
                        </button>

                        <!-- Categorias -->
                        <div class="filter-section">
                            <h4><i class="bi bi-grid"></i> Categorias</h4>
                            <ul class="filter-category-list" id="filter-categories"></ul>
                        </div>

                        <!-- Cores -->
                        <div class="filter-section">
                            <h4><i class="bi bi-palette"></i> Cores</h4>
                            <div class="filter-colors" id="filter-colors"></div>
                        </div>

                        <!-- Preço -->
                        <div class="filter-section">
                            <h4><i class="bi bi-cash"></i> Preço</h4>
                            <div class="filter-price-options" id="filter-prices"></div>
                        </div>

                        <!-- Tamanhos -->
                        <div class="filter-section">
                            <h4><i class="bi bi-rulers"></i> Tamanhos</h4>
                            <div class="filter-sizes" id="filter-sizes"></div>
                        </div>

                        <!-- Estilos -->
                        <div class="filter-section">
                            <h4><i class="bi bi-stars"></i> Estilos</h4>
                            <div class="filter-checkbox-group" id="filter-estilos"></div>
                        </div>

                        <!-- Promoções -->
                        <div class="filter-section">
                            <label class="filter-promo-toggle">
                                <input type="checkbox" id="filter-promo" onchange="applyFilters()">
                                <span><i class="bi bi-tag-fill" style="color: var(--color-primary);"></i> Somente em Promoção</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Product Grid -->
                <div class="col-lg-9">
                    <!-- Mobile Filter Button -->
                    <div class="d-lg-none mb-3">
                        <button class="btn-filter-mobile" onclick="openFilterOffcanvas()">
                            <i class="bi bi-funnel"></i> Filtros <span id="mobile-filter-count" style="display:none;"></span>
                        </button>
                    </div>

                    <!-- Top Bar -->
                    <div class="filter-top-bar">
                        <span class="filter-results-count" id="results-count">Carregando...</span>
                        <div class="filter-sort">
                            <label for="sort-select">Ordenar:</label>
                            <select id="sort-select" onchange="applyFilters()">
                                <option value="">Relevância</option>
                                <option value="menor-preco">Menor Preço</option>
                                <option value="maior-preco">Maior Preço</option>
                                <option value="nome">Nome A-Z</option>
                            </select>
                        </div>
                    </div>

                    <!-- Active Filter Chips -->
                    <div class="active-filters" id="active-filters"></div>

                    <!-- Grid -->
                    <div class="row" id="products-grid">
                        <!-- Renderizado via JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Mobile Filter Offcanvas -->
    <div class="filter-offcanvas-overlay" id="filter-offcanvas-overlay" onclick="closeFilterOffcanvas()"></div>
    <div class="filter-offcanvas" id="filter-offcanvas">
        <div class="filter-offcanvas-header">
            <h3><i class="bi bi-funnel me-2"></i>Filtros</h3>
            <button class="filter-offcanvas-close" onclick="closeFilterOffcanvas()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div id="filter-offcanvas-content">
            <!-- Cloned from desktop sidebar -->
        </div>
    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/favoritos.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/catalogo.js"></script>
    <script src="./js/categoria-filtros.js"></script>
    <script src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0t3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
