<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Entre na sua conta Bia Modas." />
    <title>Entrar | Bia Modas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/dark-mode.css">
    <script>
        (function() {
            const theme = localStorage.getItem('bia_modas_theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="auth-page">

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-3 col-md-3 col-6">
                    <a href="./index.html" class="logo">
                        <img src="./img/logoBiaModas.png" alt="Bia Modas - Moda Feminina">
                    </a>
                </div>
                <div class="col-lg-6 col-md-6 d-none d-md-block">
                    <div class="search-box mx-auto">
                        <input type="text" id="search-input" placeholder="O que você procura?" aria-label="Pesquisar produtos">
                        <button type="button" aria-label="Buscar" onclick="handleSearch()"><i class="bi bi-search"></i></button>
                    </div>
                </div>
                <div class="col-lg-3 col-md-3 col-6 text-end">
                    <div class="header-actions justify-content-end">
                        <a href="#" aria-label="Alternar tema" id="theme-toggle">
                            <i class="bi bi-moon-fill"></i>
                        </a>
                        <a href="#" aria-label="Minha conta"><i class="bi bi-person"></i></a>
                        <a href="./favoritos.html" aria-label="Favoritos"><i class="bi bi-heart"></i></a>
                        <a href="#" aria-label="Carrinho" onclick="openCart(); return false;">
                            <i class="bi bi-bag"></i>
                            <span class="badge-count" id="cart-count">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header">
                <h1>Bem-vinda de volta!</h1>
                <p>Entre com seus dados para continuar</p>
            </div>
            <div class="auth-card-body">
                <form class="auth-form" id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">E-mail <span class="required">*</span></label>
                        <input type="email" class="form-control" id="login-email" placeholder="seu@email.com" required>
                        <div class="invalid-feedback" id="login-email-error">Digite um e-mail válido.</div>
                    </div>

                    <div class="form-group">
                        <label for="login-senha">Senha <span class="required">*</span></label>
                        <div class="password-field">
                            <input type="password" class="form-control" id="login-senha" placeholder="Sua senha" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('login-senha', this)" aria-label="Mostrar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" id="login-senha-error">Digite sua senha.</div>
                    </div>

                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 0; font-weight: 400;">
                            <input type="checkbox" id="login-lembrar" style="width: 18px; height: 18px; accent-color: var(--color-primary);">
                            Lembrar de mim
                        </label>
                        <a href="#" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-primary-solid" style="width: 100%; margin-top: 10px;">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </form>

                <div class="auth-footer">
                    Ainda não tem uma conta? <a href="./registro.html">Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
    <!-- Cart Offcanvas -->
    <div class="cart-offcanvas" id="cart-offcanvas">
        <div class="cart-header">
            <h3><i class="bi bi-bag me-2"></i>Meu Carrinho</h3>
            <button class="cart-close" onclick="closeCart()" aria-label="Fechar carrinho"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="cart-items" id="cart-items">
            <div class="cart-empty">
                <i class="bi bi-bag"></i>
                <p>Seu carrinho está vazio</p>
                <p style="font-size: 0.9rem;">Adicione produtos para continuar</p>
            </div>
        </div>
        <div class="cart-footer" id="cart-footer" style="display: none;">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">R$ 0,00</span>
            </div>
            <button class="btn-checkout" onclick="finalizeOrder()">
                <i class="bi bi-whatsapp"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-notification" id="toast-notification">
        <i class="bi bi-check-circle"></i>
        <span id="toast-message">Produto adicionado ao carrinho!</span>
    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/main.js"></script>
    <script>
    (function() {
        // Redirect se já estiver logada
        if (isLoggedIn()) {
            window.location.href = './index.html';
            return;
        }

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('login-email');
        const senhaInput = document.getElementById('login-senha');

        function validate() {
            let valid = true;
            if (!validateEmail(emailInput.value.trim())) {
                emailInput.classList.add('is-invalid');
                document.getElementById('login-email-error').classList.add('show');
                valid = false;
            } else {
                emailInput.classList.remove('is-invalid');
                emailInput.classList.add('is-valid');
                document.getElementById('login-email-error').classList.remove('show');
            }

            if (senhaInput.value.length < 1) {
                senhaInput.classList.add('is-invalid');
                document.getElementById('login-senha-error').classList.add('show');
                valid = false;
            } else {
                senhaInput.classList.remove('is-invalid');
                document.getElementById('login-senha-error').classList.remove('show');
            }
            return valid;
        }

        emailInput.addEventListener('input', function() {
            if (this.value.trim()) validate();
        });
        senhaInput.addEventListener('input', function() {
            if (this.value) validate();
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!validate()) return;

            const result = loginUser(emailInput.value.trim(), senhaInput.value);
            if (result.success) {
                showToast(result.message);
                // Redireciona para página anterior ou index
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect') || './index.html';
                setTimeout(() => window.location.href = redirect, 800);
            } else {
                showToast(result.message);
                senhaInput.classList.add('is-invalid');
            }
        });
    })();

    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
            btn.setAttribute('aria-label', 'Ocultar senha');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
            btn.setAttribute('aria-label', 'Mostrar senha');
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0t3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
